
name: RAG Evaluation Pipeline

# ---------------------------------------------------------
# Trigger workflow on pull requests to main
# ---------------------------------------------------------
on:
  pull_request:
    branches:
      - main


jobs:

  evaluate-rag:

    runs-on: ubuntu-latest

    steps:

      # ---------------------------------------------------
      # Checkout repository code
      # ---------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------
      # Install Python
      # ---------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ---------------------------------------------------
      # Install backend dependencies
      # ---------------------------------------------------
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      # ---------------------------------------------------
      # Run pytest unit tests
      # ---------------------------------------------------
      - name: Run unit tests
        working-directory: backend
        run: |
          pytest tests/

      # ---------------------------------------------------
      # Run RAG evaluation benchmark
      # ---------------------------------------------------
      - name: Run evaluation benchmark
        working-directory: backend
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

          EVAL_API_URL: ${{ secrets.EVAL_API_URL }}

        run: |
          python eval/eval_runner.py

      # ---------------------------------------------------
      # Post evaluation success comment
      # ---------------------------------------------------
      - name: Comment PR on success
        if: success()

        uses: actions/github-script@v7

        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `
              ✅ RAG evaluation passed successfully.

              Unit tests passed.
              Evaluation metrics met thresholds.
              `
            })

      # ---------------------------------------------------
      # Post failure comment
      # ---------------------------------------------------
      - name: Comment PR on failure
        if: failure()

        uses: actions/github-script@v7

        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `
              ❌ RAG evaluation failed.

              One or more quality thresholds were not met.
              Please review retrieval, reranking, or generation changes.
              `
            })
